name: GitHub Actions Ansible Vault
author: step-security
description: Decrypt or encrypt file with Ansible Vault
branding:
  icon: lock
  color: gray-dark
inputs:
  command:
    description: "Command to execute"
    required: true
    default: "ansible-vault --version"
  vault_key:
    description: "Vault key"
    required: true
    default: ""
runs:
  using: "docker"
  image: "docker://ghcr.io/step-security/github-actions-ansible-vault:v1.0.0@sha256:2d59feb38a0271f3078f44a283c23fa68bf3d497e5c8bdebbbac7eea9ec8ea11" #v1.0.0
